name: build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: gofmt
        run: test -z "$(gofmt -l .)" || { echo "needs gofmt:"; gofmt -l .; exit 1; }
      - run: go vet ./...
      - run: go test -race ./...
      - run: go build ./...

  image:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Publishes to GHCR. To publish to the same ECR the preview cluster pulls app
      # images from, swap this login + tags for aws-actions/amazon-ecr-login and the
      # ECR repo, and set the deployer's GATEKEEPER_IMAGE to match.
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/gatekeeper:latest
            ghcr.io/${{ github.repository_owner }}/gatekeeper:${{ github.sha }}
