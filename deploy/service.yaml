# Stable Service the Ingress/Gateway points at. Port 80 maps to the container's 8080.
apiVersion: v1
kind: Service
metadata:
  name: gatekeeper
  namespace: gatekeeper
  labels:
    app: gatekeeper
spec:
  type: ClusterIP
  selector:
    app: gatekeeper
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
