# Stable Service the per-app Ingress points at. Port 80 (what ingress-nginx
# targets) maps to the container's 8080.
apiVersion: v1
kind: Service
metadata:
  name: gatekeeper
  namespace: preview-example
  labels:
    app: gatekeeper
spec:
  type: ClusterIP
  selector:
    app: gatekeeper
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
