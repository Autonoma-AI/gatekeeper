# Minimum to scale workloads and detect readiness within this namespace.
# patch on the parent objects sets spec.replicas and the wake annotation in one
# merge patch; workload status (readyReplicas) and pod state are read on wake.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gatekeeper
  namespace: gatekeeper
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch", "patch"]
  # pods: on wake, fail fast when a managed pod is wedged (bad image, crash loop)
  # instead of holding the request until the wake timeout.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list"]
