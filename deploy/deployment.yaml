# The Gatekeeper pod. It manages the namespace it runs in (NAMESPACE comes from
# the downward API) and excludes itself from scaling via SELF_NAME (= its own
# Deployment name, "gatekeeper").
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gatekeeper
  namespace: gatekeeper
  labels:
    app: gatekeeper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gatekeeper
  template:
    metadata:
      labels:
        app: gatekeeper
    spec:
      serviceAccountName: gatekeeper
      containers:
        - name: gatekeeper
          image: ghcr.io/autonoma-ai/gatekeeper:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            # --- required ---
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: ROUTES_JSON
              valueFrom:
                configMapKeyRef:
                  name: gatekeeper-routes
                  key: routes.json
            # --- scale-to-zero (optional; defaults shown) ---
            - name: IDLE_TIMEOUT
              value: "30m"
            # --- auth (optional; leaving AUTH_TOKEN unset disables auth) ---
            # - name: AUTH_TOKEN
            #   value: "change-me"
            # - name: LOGIN_URL
            #   value: "https://login.example.com"
            # - name: COOKIE_DOMAIN
            #   value: "example.com"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 1
            periodSeconds: 3
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 64Mi
