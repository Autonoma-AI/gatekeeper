# The Gatekeeper pod. It carries previewkit.dev/managed-by=previewkit like every
# managed workload, but excludes itself from scaling via the app=gatekeeper label.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gatekeeper
  namespace: preview-example
  labels:
    app: gatekeeper
    previewkit.dev/managed-by: previewkit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gatekeeper
  template:
    metadata:
      labels:
        app: gatekeeper
        previewkit.dev/managed-by: previewkit
    spec:
      serviceAccountName: gatekeeper
      containers:
        - name: gatekeeper
          image: ghcr.io/autonoma-ai/gatekeeper:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: BYPASS_TOKEN
              value: "REPLACE_WITH_ENVIRONMENT_BYPASS_TOKEN"
            - name: COOKIE_DOMAIN
              value: "preview.autonoma.app"
            - name: APP_URL
              value: "https://beta.autonoma.app"
            - name: IDLE_TIMEOUT
              value: "30m"
            - name: ROUTES_JSON
              valueFrom:
                configMapKeyRef:
                  name: gatekeeper-routes
                  key: routes.json
          readinessProbe:
            httpGet:
              path: /gatekeeper-health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 64Mi
