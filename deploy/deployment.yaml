# The Gatekeeper pod. It manages the namespace it runs in (NAMESPACE comes from
# the downward API) and excludes itself from scaling via SELF_NAME (= its own
# Deployment name, "gatekeeper").
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gatekeeper
  namespace: gatekeeper
  labels:
    app: gatekeeper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gatekeeper
  template:
    metadata:
      labels:
        app: gatekeeper
    spec:
      serviceAccountName: gatekeeper
      containers:
        - name: gatekeeper
          image: public.ecr.aws/autonoma/gatekeeper:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            # --- required ---
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: ROUTES_JSON
              valueFrom:
                configMapKeyRef:
                  name: gatekeeper-routes
                  key: routes.json
            # --- scale-to-zero ---
            # TARGET_SELECTOR MUST match the labels on the workloads you want scaled
            # (here: anything labeled gatekeeper.dev/scale-to-zero=true). SELF_NAME is
            # this Deployment's name, excluded so Gatekeeper never scales itself.
            - name: TARGET_SELECTOR
              value: "gatekeeper.dev/scale-to-zero=true"
            - name: SELF_NAME
              value: "gatekeeper"
            # Idle duration before scale-to-zero. Set to "0" to disable scale-to-zero
            # (run as a pure wake-on-request proxy; the namespace is never auto-slept).
            - name: IDLE_TIMEOUT
              value: "30m"
            # HEALTH_PATH MUST equal the readinessProbe path below (and any livenessProbe).
            # If they disagree the probe hits a normal route, 404s, and the pod never
            # goes Ready - so ingress gets no endpoint.
            - name: HEALTH_PATH
              value: "/healthz"
            # --- auth (optional; leaving AUTH_TOKEN unset disables auth) ---
            # - name: AUTH_TOKEN
            #   value: "change-me"
            # - name: LOGIN_URL
            #   value: "https://login.example.com"
            # - name: COOKIE_DOMAIN
            #   value: "example.com"
          readinessProbe:
            httpGet:
              path: /healthz # MUST equal HEALTH_PATH above
              port: 8080
            initialDelaySeconds: 1
            periodSeconds: 3
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 64Mi
