# REQUIRED only when the namespace runs a default-deny egress NetworkPolicy that
# excludes RFC1918 ranges (a common namespace-isolation setup). Without it,
# Gatekeeper cannot reach the in-cluster Kubernetes API server and every scale
# call hangs.
#
# Scoped to the Gatekeeper pod only (app=gatekeeper), so other pods keep their
# egress rules unchanged. NetworkPolicies are additive whitelists.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gatekeeper-apiserver-egress
  namespace: gatekeeper
spec:
  podSelector:
    matchLabels:
      app: gatekeeper
  policyTypes: ["Egress"]
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
