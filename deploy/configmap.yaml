# Host -> upstream routing table that Gatekeeper reads via the ROUTES_JSON env var.
apiVersion: v1
kind: ConfigMap
metadata:
  name: gatekeeper-routes
  namespace: gatekeeper
data:
  routes.json: |
    {
      "app.example.com": { "service": "web", "port": 3000 },
      "api.example.com": { "service": "api", "port": 8080 }
    }
