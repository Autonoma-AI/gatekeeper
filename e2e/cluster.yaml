# End-to-end harness for CLUSTER MODE on a local cluster: one Gatekeeper
# Deployment (3 replicas, leader election) in its own namespace DISCOVERING
# two labeled app namespaces, whose routes live in their annotations - no
# ROUTES_JSON, no NAMESPACE env at all. Auth is off here (the single-namespace
# suite covers it); this suite focuses on discovery, leader election, label
# steering, and failover.
#
# Apply with `e2e/run-cluster.sh`, or by hand:
#   kubectl --context orbstack apply -f e2e/cluster.yaml
---
apiVersion: v1
kind: Namespace
metadata:
  name: gatekeeper-e2e-sys
---
apiVersion: v1
kind: Namespace
metadata:
  name: gatekeeper-e2e-a
  labels:
    gatekeeper.dev/managed: "true"
  annotations:
    gatekeeper.dev/routes: |
      { "whoami-a.example.test": { "service": "whoami", "port": 80 } }
---
apiVersion: v1
kind: Namespace
metadata:
  name: gatekeeper-e2e-b
  labels:
    gatekeeper.dev/managed: "true"
  annotations:
    gatekeeper.dev/routes: |
      { "whoami-b.example.test": { "service": "whoami", "port": 80 } }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami
  namespace: gatekeeper-e2e-a
  labels:
    app: whoami
    gatekeeper.dev/scale-to-zero: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whoami
  template:
    metadata:
      labels:
        app: whoami
        gatekeeper.dev/scale-to-zero: "true"
    spec:
      containers:
        - name: whoami
          image: traefik/whoami:latest
          args: ["--port=80"]
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 1
            periodSeconds: 2
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 32Mi
---
apiVersion: v1
kind: Service
metadata:
  name: whoami
  namespace: gatekeeper-e2e-a
spec:
  type: ClusterIP
  selector:
    app: whoami
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami
  namespace: gatekeeper-e2e-b
  labels:
    app: whoami
    gatekeeper.dev/scale-to-zero: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whoami
  template:
    metadata:
      labels:
        app: whoami
        gatekeeper.dev/scale-to-zero: "true"
    spec:
      containers:
        - name: whoami
          image: traefik/whoami:latest
          args: ["--port=80"]
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 1
            periodSeconds: 2
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 32Mi
---
apiVersion: v1
kind: Service
metadata:
  name: whoami
  namespace: gatekeeper-e2e-b
spec:
  type: ClusterIP
  selector:
    app: whoami
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gatekeeper
  namespace: gatekeeper-e2e-sys
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gatekeeper-e2e
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gatekeeper-e2e
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: gatekeeper-e2e
subjects:
  - kind: ServiceAccount
    name: gatekeeper
    namespace: gatekeeper-e2e-sys
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gatekeeper-leader
  namespace: gatekeeper-e2e-sys
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gatekeeper-leader
  namespace: gatekeeper-e2e-sys
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gatekeeper-leader
subjects:
  - kind: ServiceAccount
    name: gatekeeper
    namespace: gatekeeper-e2e-sys
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gatekeeper
  namespace: gatekeeper-e2e-sys
  labels:
    app: gatekeeper
spec:
  replicas: 3
  selector:
    matchLabels:
      app: gatekeeper
  template:
    metadata:
      labels:
        app: gatekeeper
    spec:
      serviceAccountName: gatekeeper
      containers:
        - name: gatekeeper
          image: gatekeeper:dev
          imagePullPolicy: IfNotPresent # locally-built image (OrbStack shares the docker store)
          ports:
            - containerPort: 8080
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: LEADER_ELECTION
              value: "true"
            - name: NAMESPACE_SELECTOR
              value: "gatekeeper.dev/managed=true"
            # Short timers so the sleep/wake cycle is easy to observe in a test run.
            - name: IDLE_TIMEOUT
              value: "20s"
            - name: IDLE_CHECK_INTERVAL
              value: "5s"
            - name: WAKE_TIMEOUT
              value: "60s"
            - name: LOG_LEVEL
              value: "debug"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 1
            periodSeconds: 3
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 128Mi
---
# Selects the leader-labeled pod only; standbys are Ready but receive nothing.
apiVersion: v1
kind: Service
metadata:
  name: gatekeeper
  namespace: gatekeeper-e2e-sys
  labels:
    app: gatekeeper
spec:
  type: ClusterIP
  selector:
    app: gatekeeper
    gatekeeper.dev/role: leader
  ports:
    - port: 80
      targetPort: 8080
